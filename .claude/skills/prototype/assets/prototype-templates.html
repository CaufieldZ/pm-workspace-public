<!-- ───────── E1. iOS 状态栏 · 深色 · 390×44（iPhone Pro 系） ───────── -->
<!-- 来源：Figma node 1116-25679 · ./figma-anchors/ios-statusbar-dark.png -->
<!-- 用法：直接放 .app-mock 第一个子元素位置（Dynamic Island ::before 在视觉上方覆盖）-->
<div class="sbar" data-theme="dark">
  <span class="sbar-time">9:41</span>
  <div class="sbar-status">
    <span class="sig">●●●●</span>
    <span class="wifi">▲</span>
    <span class="bat"><span class="bat-fill"></span></span>
  </div>
</div>
<!-- 配套 CSS（如需独立使用复制下方）：
.sbar{display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:44px;font-family:'HarmonyOS Sans SC','SF Pro Display',-apple-system,sans-serif;}
.sbar[data-theme="dark"]{background:#000;color:#FFF;}
.sbar[data-theme="light"]{background:#FFF;color:#000;}
.sbar-time{font-size:17px;font-weight:600;letter-spacing:-0.3px;}
.sbar-status{display:flex;align-items:center;gap:6px;font-size:13px;}

.sbar .bat::after{content:'';position:absolute;right:-3px;top:3.5px;width:1.5px;height:4px;background:currentColor;border-radius:0 1px 1px 0;}
.sbar .bat-fill{position:absolute;inset:1.5px;width:18px;height:7px;background:currentColor;border-radius:1.3px;display:block;}
-->

    <span class="t on">发现</span>

    <span class="t">快讯</span>

    <span class="caret-up">︿</span>
  </div>
  <div class="htx-tbar-main">
    <div class="tab on"><i class="ic-home">🏠</i><span>首页</span></div>
    <div class="tab"><i class="ic-market">📊</i><span>行情</span></div>
    <div class="tab tab-fab"><i class="ic-trade">⇄</i><span>交易</span></div>
    <div class="tab"><i class="ic-explore">🔍</i><span>探索</span></div>
    <div class="tab"><i class="ic-assets">💼</i><span>资产</span></div>
  </div>
  <div class="home-ind"><div></div></div>
</nav>
